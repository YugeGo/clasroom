version: "3.9"

services:
  # ─── PostgreSQL 数据库 ───
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: campus_rooms
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./app/database/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ─── Redis 缓存 ───
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ─── FastAPI 后端 ───
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: "postgresql+asyncpg://postgres:postgres@postgres:5432/campus_rooms"
      REDIS_URL: "redis://redis:6379/0"
      EDU_BASE_URL: "${EDU_BASE_URL:-}"
      EDU_USERNAME: "${EDU_USERNAME:-}"
      EDU_PASSWORD: "${EDU_PASSWORD:-}"
      OPENAI_API_KEY: "${OPENAI_API_KEY:-}"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ─── 前端 (Vite) ───
  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  pgdata:
